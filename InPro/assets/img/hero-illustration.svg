    <rect x="230" y="250" rx="26" ry="26" width="500" height="120" fill="#0c1526" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="230" y="390" rx="26" ry="26" width="740" height="260" fill="#0c1526" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>

